name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Determine npm dist-tag
        id: tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          # Extract prerelease label (e.g. "dev" from "4.0.0-dev.0"); empty for stable
          PRERELEASE=$(node -p "require('semver').prerelease('$PKG_VERSION')?.[0] || ''")
          if [ -n "$PRERELEASE" ]; then
            echo "dist_tag=$PRERELEASE" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.tag.outputs.dist_tag }}
